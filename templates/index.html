<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>博弈象棋 · 决斗版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        /* ... (保留之前的样式) ... */
        body { font-family: 'KaiTi', serif; background-color: #f0e6d2; text-align: center; }
        .container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        
        #game-board {
            display: grid;
            grid-template-columns: repeat(9, 60px);
            grid-template-rows: repeat(9, 60px);
            background-color: #deb887;
            border: 5px solid #8b4513;
        }

        .cell {
            width: 60px; height: 60px;
            border: 1px solid #a0522d;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; cursor: pointer;
            user-select: none;
        }
        .river { background-color: #87ceeb; opacity: 0.3; }

        .piece {
            width: 50px; height: 50px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            color: white;
            position: relative;
        }
        .side-R { background-color: #e74c3c; border: 2px solid #c0392b; }
        .side-B { background-color: #34495e; border: 2px solid #2c3e50; }
        .selected { box-shadow: 0 0 10px 5px yellow; }

        /* 战斗弹窗样式 */
        #combat-modal {
            position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9); color: white;
            padding: 20px; border-radius: 10px; border: 2px solid gold;
            display: none; z-index: 1000; text-align: center;
        }
        .sticks-display { font-family: monospace; font-size: 20px; letter-spacing: 5px; color: yellow; }
        
        #info-panel { width: 250px; text-align: left; padding: 15px; background: white; border: 1px solid #ccc; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="combat-modal">
        <h2 style="color: red;">⚔️ 决斗时刻 ⚔️</h2>
        <div id="combat-details"></div>
        <h3 id="combat-result"></h3>
    </div>

    <h1>博弈象棋 · 决斗版</h1>

    {% if not current_user.is_authenticated %}
        <div style="margin-top:100px;">
            <a href="/game/bo/login"><button>登录游戏</button></a>
        </div>
    {% else %}
        <div id="lobby">
            <p>玩家: {{ current_user.username }}</p>
            <button onclick="createGame()">创建房间</button>
            <input type="text" id="room-input" placeholder="输入房间ID">
            <button onclick="joinGame()">加入房间</button>
        </div>

        <div id="game-area" style="display:none;">
            <div class="container">
                <div id="game-board"></div>
                
                <div id="info-panel">
                    <h3>房间 ID: <span id="disp-room-id"></span></h3>
                    <p>状态: <span id="status-msg">等待中...</span></p>
                    <hr>
                    <p>当前回合: <strong id="disp-turn" style="font-size: 18px;"></strong></p>
                    
                    <div style="background: #eee; padding: 10px; margin: 10px 0; border-radius: 5px;">
                        <p>本回剩余步数: <span id="disp-steps" style="font-size:30px; color:red; font-weight:bold;">0</span></p>
                        <button id="btn-roll" onclick="rollForTurn()" style="width:100%; background:gold; color:black;">🎲 掷采 (决定步数)</button>
                    </div>

                    <button onclick="endTurnManual()">结束回合</button>
                    
                    <div id="log-area" style="margin-top:20px; font-size:12px; height:150px; overflow-y:auto; border-top:1px solid #ccc;">
                        <p style="color:gray;">-- 游戏日志 --</p>
                    </div>
                </div>
            </div>
        </div>
    {% endif %}

    <script>
        const socket = io();
        let currentRoomId = null;
        let mySide = null; 
        let currentTurnPlayerId = null;
        let myUserId = {{ current_user.id if current_user.is_authenticated else 'null' }};
        let selectedPiece = null;
        let globalBoardState = []; // 缓存棋盘数据

        // --- Socket 监听 ---

        socket.on('game_created', (data) => {
            mySide = 'R'; 
            initGameUI(data.room_id, data.state, "等待对手...");
        });

        socket.on('game_started', (data) => {
            if (myUserId === data.players.R.id) mySide = 'R';
            else if (myUserId === data.players.B.id) mySide = 'B';
            else mySide = 'Spectator';
            
            initGameUI(data.room_id, data.state, `对手: ${mySide==='R'?data.players.B.name:data.players.R.name}`);
        });

        socket.on('roll_result', (data) => {
            addLog(`🎲 掷采: [${data.sticks.join('')}] -> ${data.steps} 步`);
        });

        socket.on('board_update', (data) => {
            renderBoard(data.state.board);
            updateInfo(data.state);
            
            // 如果有战斗数据，展示弹窗
            if (data.combat) {
                showCombatModal(data.combat);
            }
            if (data.turn_ended) {
                addLog("--- 回合结束 ---");
            }
        });

        socket.on('error', (data) => {
            alert(data.msg);
        });

        // --- 逻辑函数 ---

        function initGameUI(roomId, state, msg) {
            currentRoomId = roomId;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            document.getElementById('disp-room-id').innerText = roomId;
            document.getElementById('status-msg').innerText = msg;
            renderBoard(state.board);
            updateInfo(state);
        }

        function createGame() { socket.emit('create_game'); }
        function joinGame() { 
            const id = document.getElementById('room-input').value;
            if(id) socket.emit('join_game', {room_id: id});
        }
        function rollForTurn() {
            socket.emit('roll_for_turn', {room_id: currentRoomId});
        }
        function endTurnManual() {
            socket.emit('end_turn_manually', {room_id: currentRoomId});
        }

        function updateInfo(state) {
            currentTurnPlayerId = state.turn;
            document.getElementById('disp-steps').innerText = state.steps_left;
            
            const isMyTurn = (state.turn === myUserId);
            document.getElementById('disp-turn').innerText = isMyTurn ? "👉 轮到你了" : "⏳ 对方回合";
            document.getElementById('disp-turn').style.color = isMyTurn ? "green" : "gray";

            // 控制掷采按钮：只有是我的回合，且还没掷过采(has_rolled=false)时可用
            const btnRoll = document.getElementById('btn-roll');
            if (isMyTurn && !state.has_rolled) {
                btnRoll.disabled = false;
                btnRoll.innerText = "🎲 掷采 (决定步数)";
            } else {
                btnRoll.disabled = true;
                btnRoll.innerText = state.has_rolled ? "已掷采" : "等待回合";
            }

            if (state.winner) {
                setTimeout(() => alert(`游戏结束! ${state.winner === 'R' ? '红方' : '黑方'} 获胜!`), 500);
            }
        }

        function showCombatModal(combat) {
            const modal = document.getElementById('combat-modal');
            const details = document.getElementById('combat-details');
            const result = document.getElementById('combat-result');
            
            // 格式化二进制
            const atkBin = combat.attacker.sticks.join('');
            const defBin = combat.defender.sticks.join('');
            
            details.innerHTML = `
                <p>进攻方 (${combat.attacker.side})</p>
                <div class="sticks-display">${atkBin}</div>
                <p>战力: <strong>${combat.attacker.power}</strong></p>
                <hr style="border-color: #555;">
                <p>防守方 (${combat.defender.side})</p>
                <div class="sticks-display">${defBin}</div>
                <p>战力: <strong>${combat.defender.power}</strong></p>
            `;
            
            if (combat.winner === 'attacker') {
                result.innerText = "💥 进攻成功！防守方被吃！";
                result.style.color = "#0f0";
            } else {
                result.innerText = "🛡️ 进攻失败！遭到反杀！";
                result.style.color = "orange";
            }
            
            modal.style.display = 'block';
            addLog(combat.msg);

            // 3秒后自动关闭
            setTimeout(() => { modal.style.display = 'none'; }, 3000);
        }

        function addLog(msg) {
            const logArea = document.getElementById('log-area');
            const p = document.createElement('p');
            p.innerText = msg;
            p.style.margin = "2px 0";
            logArea.prepend(p);
        }

        function renderBoard(boardData) {
            globalBoardState = boardData; // 更新缓存
            const boardContainer = document.getElementById('game-board');
            boardContainer.innerHTML = ''; 

            if (!boardData) return;

            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (r === 4) cell.classList.add('river');

                    const piece = boardData[r][c];
                    if (piece) {
                        const pDiv = document.createElement('div');
                        pDiv.className = `piece side-${piece.side}`;
                        pDiv.innerText = piece.type === 'X' ? '枭' : '散';
                        if (selectedPiece && selectedPiece.r === r && selectedPiece.c === c) {
                            pDiv.classList.add('selected');
                        }
                        cell.appendChild(pDiv);
                    }
                    cell.onclick = () => handleCellClick(r, c, piece);
                    boardContainer.appendChild(cell);
                }
            }
        }

        function handleCellClick(r, c, piece) {
            if (currentTurnPlayerId !== myUserId) return;

            // 移动逻辑
            if (!selectedPiece) {
                if (piece && piece.side === mySide) {
                    selectedPiece = {r, c};
                    renderBoard(globalBoardState);
                }
            } else {
                // 取消选中
                if (selectedPiece.r === r && selectedPiece.c === c) {
                    selectedPiece = null;
                    renderBoard(globalBoardState);
                    return;
                }
                // 切换选中
                if (piece && piece.side === mySide) {
                    selectedPiece = {r, c};
                    renderBoard(globalBoardState);
                    return;
                }
                // 移动或攻击
                socket.emit('move_piece', {
                    room_id: currentRoomId,
                    from_r: selectedPiece.r,
                    from_c: selectedPiece.c,
                    to_r: r,
                    to_c: c
                });
                selectedPiece = null;
            }
        }
    </script>
</body>
</html>
