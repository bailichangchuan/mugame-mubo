{% extends "base.html" %}

{% block title %}六博 · 大厅{% endblock %}

{% block content %}
<style>
    .hall-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 120px 20px 60px;
    }
    
    .hall-header {
        text-align: center;
        margin-bottom: 40px;
        animation: fadeInDown 0.8s ease;
    }
    
    .hall-title {
        font-size: 48px;
        color: var(--ink-red);
        margin: 0 0 10px 0;
        letter-spacing: 15px;
        text-shadow: 
            0 0 20px rgba(139, 37, 0, 0.3),
            2px 2px 4px rgba(0, 0, 0, 0.1);
    }
    
    .hall-welcome {
        font-size: 20px;
        color: var(--ink-brown);
        letter-spacing: 5px;
    }
    
    .hall-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        gap: 25px;
        animation: fadeInUp 0.8s ease 0.2s both;
    }
    
    .hall-card {
        background: linear-gradient(145deg, var(--cream) 0%, var(--paper) 100%);
        border: 2px solid var(--ink-brown);
        border-radius: 12px;
        padding: 25px;
        box-shadow: 
            0 6px 20px rgba(74, 63, 53, 0.15),
            inset 0 1px 0 rgba(255, 255, 255, 0.9);
        transition: all 0.3s ease;
    }
    
    .hall-card:hover {
        transform: translateY(-3px);
        box-shadow: 
            0 10px 30px rgba(74, 63, 53, 0.25),
            inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }
    
    .card-title {
        font-size: 24px;
        color: var(--ink-dark);
        margin: 0 0 15px 0;
        display: flex;
        align-items: center;
        gap: 10px;
        letter-spacing: 3px;
    }
    
    .card-divider {
        height: 2px;
        background: linear-gradient(90deg, var(--ink-brown), transparent);
        margin: 15px 0;
        border-radius: 1px;
    }
    
    .hall-btn {
        display: block;
        width: 100%;
        padding: 14px 20px;
        font-family: 'KaiTi', 'STKaiti', 'FangSong', serif;
        font-size: 18px;
        color: white;
        background: linear-gradient(135deg, var(--ink-red) 0%, #6b1d00 100%);
        border: 2px solid var(--ink-brown);
        border-radius: 8px;
        cursor: pointer;
        letter-spacing: 5px;
        transition: all 0.3s ease;
        box-shadow: 
            0 4px 12px rgba(139, 37, 0, 0.3),
            inset 0 1px 0 rgba(255, 255, 255, 0.2);
        margin-bottom: 12px;
    }
    
    .hall-btn:hover {
        transform: translateY(-2px);
        box-shadow: 
            0 6px 18px rgba(139, 37, 0, 0.4),
            inset 0 1px 0 rgba(255, 255, 255, 0.2);
        background: linear-gradient(135deg, #a03000 0%, var(--ink-red) 100%);
    }
    
    .hall-btn-secondary {
        background: linear-gradient(135deg, var(--ink-brown) 0%, #2a2520 100%);
        box-shadow: 
            0 4px 12px rgba(42, 37, 32, 0.3),
            inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }
    
    .hall-btn-secondary:hover {
        background: linear-gradient(135deg, #5a4f45 0%, var(--ink-brown) 100%);
        box-shadow: 
            0 6px 18px rgba(42, 37, 32, 0.4),
            inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }
    
    .hall-btn-small {
        padding: 10px 15px;
        font-size: 14px;
        margin-bottom: 8px;
    }
    
    .ai-stats-card {
        background: linear-gradient(145deg, #fff9e6 0%, #f5edd6 100%);
        border-color: var(--ink-red);
    }
    
    .ai-stats-number {
        font-size: 64px;
        color: var(--ink-red);
        text-align: center;
        margin: 20px 0;
        text-shadow: 
            0 0 30px rgba(139, 37, 0, 0.4),
            3px 3px 6px rgba(0, 0, 0, 0.15);
        animation: pulse 2s ease-in-out infinite;
    }
    
    .ai-stats-label {
        font-size: 18px;
        color: var(--ink-brown);
        text-align: center;
        letter-spacing: 5px;
    }
    
    .input-group {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
    }
    
    .hall-input {
        flex: 1;
        padding: 12px 15px;
        font-family: 'KaiTi', 'STKaiti', 'FangSong', serif;
        font-size: 16px;
        color: var(--ink-dark);
        background: rgba(255, 255, 255, 0.8);
        border: 2px solid var(--ink-light);
        border-radius: 8px;
        transition: all 0.3s ease;
    }
    
    .hall-input:focus {
        outline: none;
        border-color: var(--ink-red);
        box-shadow: 0 0 10px rgba(139, 37, 0, 0.2);
    }
    
    .hall-input::placeholder {
        color: var(--ink-light);
    }
    
    .hall-select {
        width: 100%;
        padding: 12px 15px;
        font-family: 'KaiTi', 'STKaiti', 'FangSong', serif;
        font-size: 16px;
        color: var(--ink-dark);
        background: rgba(255, 255, 255, 0.8);
        border: 2px solid var(--ink-light);
        border-radius: 8px;
        margin-bottom: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .hall-select:focus {
        outline: none;
        border-color: var(--ink-red);
    }
    
    .top-users-grid {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        justify-content: center;
    }
    
    .top-user-item {
        text-align: center;
        padding: 15px 20px;
        border-radius: 10px;
        min-width: 120px;
    }
    
    .top-user-item.rank-1 {
        background: linear-gradient(145deg, #fff9c4 0%, #fff176 100%);
        border: 2px solid gold;
    }
    
    .top-user-item.rank-2 {
        background: linear-gradient(145deg, #f5f5f5 0%, #e0e0e0 100%);
        border: 2px solid silver;
    }
    
    .top-user-item.rank-3 {
        background: linear-gradient(145deg, #fff3e0 0%, #ffe0b2 100%);
        border: 2px solid #cd7f32;
    }
    
    .top-user-rank {
        font-size: 32px;
        margin-bottom: 5px;
    }
    
    .top-user-name {
        font-size: 16px;
        font-weight: bold;
        color: var(--ink-dark);
        margin-bottom: 5px;
    }
    
    .top-user-stats {
        font-size: 12px;
        color: var(--ink-brown);
    }
    
    .rules-btn-fixed {
        position: fixed;
        bottom: 30px;
        right: 30px;
        padding: 15px 25px;
        font-family: 'KaiTi', 'STKaiti', 'FangSong', serif;
        font-size: 16px;
        color: white;
        background: linear-gradient(135deg, var(--ink-brown) 0%, #2a2520 100%);
        border: 2px solid var(--ink-dark);
        border-radius: 10px;
        cursor: pointer;
        letter-spacing: 3px;
        box-shadow: 
            0 4px 15px rgba(42, 37, 32, 0.4),
            inset 0 1px 0 rgba(255, 255, 255, 0.2);
        z-index: 1000;
        transition: all 0.3s ease;
    }
    
    .rules-btn-fixed:hover {
        transform: translateY(-3px);
        box-shadow: 
            0 8px 25px rgba(42, 37, 32, 0.5),
            inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }
    
    @keyframes fadeInDown {
        from {
            opacity: 0;
            transform: translateY(-30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    @keyframes pulse {
        0%, 100% {
            transform: scale(1);
        }
        50% {
            transform: scale(1.05);
        }
    }
</style>

<div class="hall-container">
    <div class="hall-header">
        <h1 class="hall-title">六博对弈</h1>
        <p class="hall-welcome">水墨丹青 · 棋局万千</p>
    </div>
    
    <div class="hall-grid">
        <div class="hall-card">
            <h2 class="card-title">🎮 创建对局</h2>
            <div class="card-divider"></div>
            <select id="map-select" class="hall-select">
                <option value="default_map">默认地图</option>
            </select>
            <button onclick="refreshMapList()" class="hall-btn hall-btn-secondary hall-btn-small">刷新地图</button>
            <button onclick="createGame()" class="hall-btn">创建房间</button>
            <button onclick="createAIGame()" class="hall-btn hall-btn-secondary">与AI对弈</button>
        </div>
        
        <div class="hall-card">
            <h2 class="card-title">🚪 加入房间</h2>
            <div class="card-divider"></div>
            <div class="input-group">
                <input type="text" id="room-input" class="hall-input" placeholder="输入房间ID">
            </div>
            <button onclick="joinGame()" class="hall-btn hall-btn-secondary">加入对战</button>
        </div>
        
        <div class="hall-card ai-stats-card">
            <h2 class="card-title">🤖 AI战绩</h2>
            <div class="card-divider"></div>
            <div class="ai-stats-number" id="ai-wins-count">0</div>
            <div class="ai-stats-label">AI获胜场次</div>
        </div>
        
        <div class="hall-card">
            <h2 class="card-title">🏆 排行榜</h2>
            <div class="card-divider"></div>
            <div class="top-users-grid" id="top-users-container">
                <div class="top-user-item rank-1">
                    <div class="top-user-rank">🥇</div>
                    <div class="top-user-name">加载中...</div>
                    <div class="top-user-stats">-</div>
                </div>
            </div>
            <button onclick="window.location.href='/game/bo/rankings'" class="hall-btn hall-btn-secondary hall-btn-small" style="margin-top: 15px;">查看完整排名</button>
        </div>
        
        <div class="hall-card">
            <h2 class="card-title">📜 我的记录</h2>
            <div class="card-divider"></div>
            <button onclick="window.location.href='/game/bo/my-games'" class="hall-btn">对局记录</button>
            <button onclick="openMapEditor()" class="hall-btn hall-btn-secondary">地图编辑器</button>
        </div>
    </div>
</div>

<button onclick="window.location.href='/game/bo/guide'" class="rules-btn-fixed">📖 游戏说明</button>
{% endblock %}

{% block extra_js %}
<script>
    function createGame() {
        const selectedMap = document.getElementById('map-select').value;
        fetch('/game/bo/api/create', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ map_name: selectedMap })
        })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    window.location.href = `/game/bo/room/${data.room_id}`;
                }
            });
    }
    
    function createAIGame() {
        const selectedMap = document.getElementById('map-select').value;
        window.location.href = `/game/bo/ai-room?map=${selectedMap}`;
    }
    
    function refreshMapList() {
        fetch('/game/bo/api/get-maps')
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                const select = document.getElementById('map-select');
                select.innerHTML = '';
                
                data.maps.forEach(map => {
                    const option = document.createElement('option');
                    option.value = map.name;
                    option.textContent = map.display_name;
                    select.appendChild(option);
                });
            }
        });
    }

    function joinGame() {
        const id = document.getElementById('room-input').value;
        if(!id) return;
        
        fetch('/game/bo/api/join', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({room_id: id})
        })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                window.location.href = `/game/bo/room/${data.room_id}`;
            } else {
                alert(data.msg);
            }
        });
    }
    
    function openMapEditor() {
        window.location.href = '/game/bo/map-editor';
    }
    
    function loadTopUsers() {
        fetch('/game/bo/api/top-users')
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    const container = document.getElementById('top-users-container');
                    container.innerHTML = '';
                    
                    if (data.top_users.length === 0) {
                        container.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--ink-brown);">暂无排名数据</div>';
                        return;
                    }
                    
                    data.top_users.slice(0, 3).forEach((item, index) => {
                        const ranks = ['🥇', '🥈', '🥉'];
                        const rankClasses = ['rank-1', 'rank-2', 'rank-3'];
                        
                        const userDiv = document.createElement('div');
                        userDiv.className = `top-user-item ${rankClasses[index]}`;
                        userDiv.innerHTML = `
                            <div class="top-user-rank">${ranks[index]}</div>
                            <div class="top-user-name">${item.username}</div>
                            <div class="top-user-stats">胜率: ${item.win_rate}%</div>
                        `;
                        container.appendChild(userDiv);
                    });
                }
            })
            .catch(error => {
                console.error('Error:', error);
            });
    }
    
    function loadAIStats() {
        fetch('/game/bo/api/ai-stats')
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('ai-wins-count').textContent = data.ai_wins;
                }
            })
            .catch(error => {
                console.error('Error:', error);
            });
    }
    
    refreshMapList();
    loadTopUsers();
    loadAIStats();
</script>
{% endblock %}
